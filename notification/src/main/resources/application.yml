server:
  port: 8083
spring:
  application:
    name: notification

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_schema: jippy_customer_and_order
      ddl-auto: update
    show-sql: true

    kafka:
      bootstrap-servers: localhost:9092
      consumer:
        # Starts reading from the beginning of the topic if no offset is found
        auto-offset-reset: earliest
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
        properties:
          # CRITICAL: Tell Spring which Java packages are safe to deserialize
          spring.json.trusted.packages: "com.jippy.notification.dto"
          # Maps the incoming JSON back to your OrderEvent class
          spring.json.value.default.type: "com.jippy.notification.dto.OrderEvent"

  # Custom Firebase Path
  app:
    firebase:
      config-path: classpath:jippy-firebase-key.json

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/