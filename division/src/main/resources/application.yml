server:
    port: 8082
spring:
  application:
    name: division
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
     hibernate:
      default_schema: jippy_division
      ddl-auto: update
    show-sql: true



