server:
  port: 8082
spring:
  application:
    name: customerandorder
  datasource:
    url: jdbc:postgresql://localhost:5432/jippy_customerAndOrder
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true