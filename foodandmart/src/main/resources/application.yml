server:
  port: 8080

spring:
  application:
    name: foodandmart
datasource:
    # Syntax: ${VARIABLE_NAME:DEFAULT_VALUE}
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fm_db}
    username: ${SPRING_DATASOURCE_USERNAME:fm_user}
    password: ${SPRING_DATASOURCE_PASSWORD:fm_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true    
eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
